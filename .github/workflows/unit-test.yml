name: Unit Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"

      - name: Install
        run: vp install

      - name: Check
        run: vp check

      - name: Test
        run: vp test

      - name: Build
        run: vp pack
